version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: anafbill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: ./backend
    container_name: anafbill-celery-worker
    command: celery -A app.tasks worker --loglevel=info
    working_dir: /app
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker

  celery-beat:
    build: ./backend
    container_name: anafbill-celery-beat
    command: celery -A app.tasks beat --loglevel=info
    working_dir: /app
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker

volumes:
  redis_data:
